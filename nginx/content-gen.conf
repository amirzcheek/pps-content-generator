# nginx server-блок для content.ai.knus.edu.kz.
# Ставится на выделенный nginx-сервер; проксирует на web-сервер, где крутится
# сервис (127.0.0.1:8080). Сам сервис наружу не торчит — доступ только через nginx.
#
# Если nginx на ОТДЕЛЬНОМ сервере (не на том, где сервис), замените 127.0.0.1
# в proxy_pass и upstream на внутренний адрес web-сервера, например 10.0.0.5:8080.

upstream content_gen_backend {
    server 127.0.0.1:8080;
}

# ── HTTP (80) → редирект на HTTPS ──
server {
    listen 80;
    listen [::]:80;
    server_name content.ai.knus.edu.kz;
    return 301 https://$host$request_uri;
}

# ── HTTPS (443) ──
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name content.ai.knus.edu.kz;

    # TLS: сертификат Let's Encrypt (получается через certbot, см. DEPLOY.md).
    ssl_certificate     /etc/letsencrypt/live/content.ai.knus.edu.kz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/content.ai.knus.edu.kz/privkey.pem;
    # Альтернатива — готовый wildcard-сертификат *.ai.knus.edu.kz:
    # ssl_certificate     /etc/ssl/knus/wildcard.ai.knus.edu.kz.fullchain.pem;
    # ssl_certificate_key /etc/ssl/knus/wildcard.ai.knus.edu.kz.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # ── Статическая тестовая страница ──
    root /var/www/content-gen;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Проксирование API сервиса ──
    # Эндпоинты ядра: /templates, /preview, /generate (+ /health для мониторинга).
    location ~ ^/(templates|preview|generate|health)$ {
        proxy_pass http://content_gen_backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        # Генерация бывает долгой — увеличенные таймауты.
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
