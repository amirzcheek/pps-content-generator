# Развёртывание агента «Генератор контента» через Docker (единый сервис:
# FastAPI отдаёт и API, и собранный React). Запуск:  docker compose up -d --build
#
# Имя сервиса = content-generator, чтобы Caddy резолвил его по имени:
#   reverse_proxy content-generator:8080
services:
  content-generator:
    build:
      context: .
      args:
        # Под-путь агента на портале (слаг) и базовый адрес API (тот же слаг).
        VITE_BASE: ${VITE_BASE:-/agents/content-generator/}
        VITE_API_BASE: ${VITE_API_BASE:-/agents/content-generator}
    container_name: content-generator
    restart: unless-stopped
    # Переменные окружения (адреса моделей, ROOT_PATH и т.п.) — из .env.
    env_file: .env
    expose:
      - "8080"

    # Caddy ходит к сервису по имени content-generator:8080 ВНУТРИ общей docker-сети
    # платформы (там же, где Caddy и web:3000). Поэтому публиковать порт на хост не
    # нужно. Подключите сервис к внешней сети платформы:
    networks:
      - platform

    # Если LLM на ТОМ ЖЕ хосте, что и Docker, изнутри контейнера её адрес —
    # host.docker.internal (для OVMS на отдельном сервере это НЕ нужно):
    # extra_hosts:
    #   - "host.docker.internal:host-gateway"

networks:
  # Внешняя сеть платформы (та, где Caddy и сервис web). Имя подставьте своё.
  platform:
    external: true
    name: ${PLATFORM_NETWORK:-platform}
