# Подключение агента к ОСНОВНОМУ домену ai.knus.edu.kz под-путём
# /agents/content-generator/ (как course-dev, examination и т.д.).
#
# Этот блок вставляется ВНУТРЬ существующего server { listen 443 ssl; ... }
# основного домена (на nginx-сервере). Отдельный server-блок/сертификат не нужен —
# используется уже настроенный TLS портала.
#
# Префикс ОБРЕЗАЕТСЯ (proxy_pass со слешем на конце): сервис видит у себя
# / , /templates , /assets/... — то есть работает «в корне», как self-contained агент.
# Если у вас принято НЕ обрезать префикс — уберите слеш после :8080 и задайте
# ROOT_PATH в .env сервиса равным префиксу.

location /agents/content-generator/ {
    # Внутренний адрес web-сервера, где крутится сервис (BIND_IP:8080).
    # ЗАМЕНИТЕ на реальный IP web-сервера, напр.: http://10.0.0.150:8080/
    proxy_pass http://127.0.0.1:8080/;

    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Prefix /agents/content-generator;

    # Генерация бывает долгой — увеличенные таймауты.
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
}

# Запрос без завершающего слеша -> добавить слеш (иначе относительные пути SPA сломаются).
location = /agents/content-generator {
    return 301 /agents/content-generator/;
}
