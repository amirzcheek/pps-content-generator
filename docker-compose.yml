# Развёртывание сервиса генератора учебного контента через Docker.
# Запуск:  docker compose up -d --build
services:
  content-gen:
    build: .
    container_name: content-gen
    restart: unless-stopped
    # Переменные окружения (адреса моделей и т.п.) — из .env (см. .env.example).
    env_file: .env
    # Адрес публикации порта задаётся в .env переменной BIND_IP:
    #   - 127.0.0.1            — если nginx на ТОМ ЖЕ хосте;
    #   - внутренний IP web-сервера — если nginx на ОТДЕЛЬНОМ сервере
    #     (тогда ОБЯЗАТЕЛЬНО закройте порт 8080 фаерволом — доступ только
    #      с nginx-хоста, см. DEPLOY.md). В интернет порт не открывается.
    ports:
      - "${BIND_IP:-127.0.0.1}:8080:8080"

    # Если локальная LLM (14b) крутится на ТОМ ЖЕ хосте, что и Docker, то изнутри
    # контейнера её адрес — host.docker.internal. Раскомментируйте строки ниже и
    # в .env укажите, например, LLM_BASE_URL=http://host.docker.internal:11434/v1
    # extra_hosts:
    #   - "host.docker.internal:host-gateway"
